<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" x="0px" y="0px"
	 viewBox="0 0 512 512" xml:space="preserve">
<defs>
  <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#FF6B9D"/>
    <stop offset="50%" style="stop-color:#C44569"/>
    <stop offset="100%" style="stop-color:#8E2D5B"/>
  </linearGradient>
  <linearGradient id="num-grad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#FFFFFF"/>
    <stop offset="100%" style="stop-color:#FFE0EB"/>
  </linearGradient>
  <style>
    .pulse-heart {
      animation: pulse-heart 2s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes pulse-heart {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
</defs>

<!-- Rounded square background -->
<rect x="16" y="16" width="480" height="480" rx="108" ry="108" fill="url(#bg-grad)"/>

<!-- Subtle glow circle behind heart -->
<circle cx="256" cy="200" r="60" fill="rgba(255,255,255,0.1)" class="pulse-heart"/>

<!-- Heart symbol -->
<text x="256" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="120" fill="white" opacity="0.95">💕</text>

<!-- App name "521" -->
<text x="256" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="160" fill="url(#num-grad)" letter-spacing="-4">521</text>

<!-- Tagline -->
<text x="256" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="36" fill="rgba(255,255,255,0.6)" letter-spacing="6">US</text>
</svg>
